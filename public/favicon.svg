<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="sphereGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  
  <rect width="256" height="256" fill="transparent" />
  
  <!-- Background Sphere -->
  <circle cx="128" cy="128" r="110" fill="url(#sphereGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="4"/>
  
  <!-- Equator (Dotted) -->
  <ellipse cx="128" cy="128" rx="110" ry="35" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3" stroke-dasharray="8,6" />
  
  <!-- Vertical Axis -->
  <line x1="128" y1="18" x2="128" y2="238" stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-dasharray="8,6" />
  
  <!-- Horizontal X-Axis -->
  <line x1="18" y1="128" x2="238" y2="128" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
  
  <!-- Quantum State Vector -->
  <g transform="translate(128,128)">
    <line x1="0" y1="0" x2="45" y2="-75" stroke="url(#arrowGrad)" stroke-width="10" stroke-linecap="round" />
    <circle cx="45" cy="-75" r="14" fill="#60a5fa" />
    <!-- Center Dot -->
    <circle cx="0" cy="0" r="6" fill="#cbd5e1" />
  </g>
</svg>
